<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agentic-render demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e4e4e7;
      min-height: 100vh;
    }
    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    h1 span { color: #f5c518; }
    .sub { color: #71717a; font-size: 14px; margin-bottom: 40px; }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 18px;
      border-radius: 6px;
      border: 1px solid #27272a;
      background: #18181b;
      color: #a1a1aa;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    button:hover { border-color: #3f3f46; color: #e4e4e7; }
    button.active { background: #f5c518; color: #000; border-color: #f5c518; }

    #output {
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 32px;
      min-height: 200px;
      background: #0c0c0c;
    }

    .speed {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #71717a;
    }
    .speed input {
      accent-color: #f5c518;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1><span>⚡</span> agentic-render</h1>
    <p class="sub">Streaming markdown renderer — zero deps, one script tag</p>

    <div class="controls">
      <button onclick="streamDemo()" class="active">▶ Stream Demo</button>
      <button onclick="instantDemo()">⚡ Instant</button>
      <button onclick="toggleTheme()">🌓 Toggle Theme</button>
      <button onclick="clearOutput()">✕ Clear</button>
    </div>

    <div class="speed">
      <label>Speed:</label>
      <input type="range" id="speed" min="5" max="100" value="20">
      <span id="speedVal">20ms</span>
    </div>

    <div id="output"></div>
  </div>

  <script src="./render.js"></script>
  <script>
    let renderer = AgenticRender.create('#output', { theme: 'dark' })
    let currentTheme = 'dark'
    let streamTimer = null

    document.getElementById('speed').addEventListener('input', (e) => {
      document.getElementById('speedVal').textContent = e.target.value + 'ms'
    })

    const DEMO_MD = `# AI Research Summary

Here's what I found about **quantum computing** breakthroughs in 2026:

## Key Developments

1. **Google's Willow Chip** — achieved 105 qubits with error correction below threshold
2. **IBM Condor** — 1,121 qubit processor now available via cloud
3. **Microsoft's topological qubits** — first practical demonstration

> "We're entering the era where quantum computers can solve problems that classical computers simply cannot." — *Nature, March 2026*

### Code Example

\`\`\`python
from qiskit import QuantumCircuit

# Create a simple quantum circuit
qc = QuantumCircuit(2, 2)
qc.h(0)           # Hadamard gate
qc.cx(0, 1)       # CNOT gate
qc.measure([0, 1], [0, 1])

# Execute on quantum hardware
result = execute(qc, backend='ibm_brisbane')
counts = result.get_counts()
print(f"Measurement results: {counts}")
\`\`\`

### Performance Comparison

| Metric | Classical | Quantum |
|--------|-----------|---------|
| Factoring (2048-bit) | ~10^18 years | ~8 hours |
| Drug simulation | ~months | ~minutes |
| Optimization | NP-hard | Polynomial |

## Implications

The convergence of three factors makes this *particularly* exciting:

- ~~Previous error rates~~ → now below correction threshold
- Hybrid classical-quantum algorithms showing **10x speedups**
- Cloud access democratizing quantum computing

### Task List

- [x] Literature review complete
- [x] Performance benchmarks collected
- [ ] Write detailed analysis
- [ ] Submit to review

---

For inline code, use \`qc.measure()\` to collapse the quantum state. Read more at [Qiskit Docs](https://qiskit.org).

***This summary was generated with agentic-lite + agentic-render.***`

    function streamDemo() {
      if (streamTimer) { clearInterval(streamTimer); streamTimer = null }
      renderer.set('')
      const speed = parseInt(document.getElementById('speed').value)
      let pos = 0
      const chunkSize = () => Math.floor(Math.random() * 4) + 1 // 1-4 chars

      streamTimer = setInterval(() => {
        if (pos >= DEMO_MD.length) {
          clearInterval(streamTimer)
          streamTimer = null
          return
        }
        const size = chunkSize()
        renderer.append(DEMO_MD.slice(pos, pos + size))
        pos += size
      }, speed)
    }

    function instantDemo() {
      if (streamTimer) { clearInterval(streamTimer); streamTimer = null }
      renderer.set(DEMO_MD)
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark'
      renderer.setTheme(currentTheme)
      document.body.style.background = currentTheme === 'dark' ? '#09090b' : '#ffffff'
      document.body.style.color = currentTheme === 'dark' ? '#e4e4e7' : '#18181b'
    }

    function clearOutput() {
      if (streamTimer) { clearInterval(streamTimer); streamTimer = null }
      renderer.set('')
    }

    // Auto-start streaming
    streamDemo()
  </script>
</body>
</html>
